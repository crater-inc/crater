<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会社概要 — 株式会社クレーター</title>
  <link rel="stylesheet" href="https://use.typekit.net/fwj5xdw.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=6">
</head>
<body>

<!-- スライドステージ（フルビューポート） -->
<div class="slide-stage" id="slide-stage"></div>

<!-- 左右クリックナビ -->
<div class="nav-prev" id="nav-prev" aria-label="前のスライド"></div>
<div class="nav-next" id="nav-next" aria-label="次のスライド"></div>

<!-- 右上UI -->
<div class="status-bar" id="status-bar"></div>
<button class="menu-btn" id="menu-btn" aria-label="メニュー">
  <span></span><span></span><span></span>
</button>

<!-- プログレスバー -->
<div class="progress-bar" id="progress-bar"></div>

<!-- サイドバー（右からスライドイン） -->
<div class="sidebar-overlay" id="sidebar-overlay">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">CRATER</span>
      <button class="sidebar-close" id="sidebar-close" aria-label="閉じる">✕</button>
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </nav>
</div>

<!-- トークスクリプト（下ホバーで表示） -->
<div class="script-trigger" id="script-trigger"></div>
<div class="script-panel" id="script-panel"></div>

<script src="js/slides.js?v=6"></script>
<script src="js/app.js?v=6"></script>

<!-- パスワード保護 -->
<div id="pw-lock" style="position:fixed;inset:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;">
  <div style="font-size:11px;letter-spacing:0.3em;color:#fff;opacity:0.4;font-family:'urw-din',sans-serif;">CRATER INC.</div>
  <input id="pw-input" type="password" placeholder="PASSWORD" autofocus
    style="background:#222;border:1px solid #444;border-radius:0;padding:12px 16px;font-size:14px;color:#fff;width:240px;text-align:center;letter-spacing:0.1em;outline:none;"
    onkeydown="if(event.key==='Enter')pwCheck()">
  <div id="pw-error" style="font-size:12px;color:#e05555;display:none;">パスワードが違います</div>
</div>
<script>
  (function () {
    if (sessionStorage.getItem('cp_auth') === '1') {
      document.getElementById('pw-lock').style.display = 'none';
    }
  })();
  function pwCheck() {
    if (document.getElementById('pw-input').value === 'view') {
      document.getElementById('pw-lock').style.display = 'none';
      sessionStorage.setItem('cp_auth', '1');
    } else {
      document.getElementById('pw-error').style.display = 'block';
      document.getElementById('pw-input').value = '';
    }
  }
</script>

</body>
</html>
