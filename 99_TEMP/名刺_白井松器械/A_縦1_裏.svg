<?xml version="1.0" encoding="UTF-8"?>
<!-- 名刺 A案 縦 裏面（英語・ベタ面・白抜き） -->
<svg xmlns="http://www.w3.org/2000/svg" width="61mm" height="97mm" viewBox="0 0 61 97">
  <defs>
    <style>
      .crop { stroke: #ffffff; stroke-width: 0.25; fill: none; }
      .crop-outer { stroke: #000000; stroke-width: 0.25; fill: none; }
      .wh { fill: #ffffff; }
      .company-en { font-family: 'Georgia', serif; font-size: 3px; fill: #ffffff; letter-spacing: 0.3px; }
      .name-en { font-family: 'Georgia', serif; font-size: 7px; fill: #ffffff; letter-spacing: 0.5px; }
      .title-en { font-family: 'Arial', 'Helvetica', sans-serif; font-size: 2.4px; fill: #cccccc; }
      .info-en { font-family: 'Arial', 'Helvetica', sans-serif; font-size: 2.3px; fill: #dddddd; }
      .rule { stroke: rgba(255,255,255,0.4); stroke-width: 0.25; }
    </style>
  </defs>

  <!-- ベタ面（塗り足しまで） -->
  <rect x="0" y="0" width="61" height="97" fill="#1a1a1a"/>

  <!-- トンボ（白） -->
  <line x1="0" y1="3" x2="2" y2="3" class="crop-outer" stroke="#000"/>
  <line x1="3" y1="0" x2="3" y2="2" class="crop-outer" stroke="#000"/>
  <line x1="59" y1="3" x2="61" y2="3" class="crop-outer" stroke="#000"/>
  <line x1="58" y1="0" x2="58" y2="2" class="crop-outer" stroke="#000"/>
  <line x1="0" y1="94" x2="2" y2="94" class="crop-outer" stroke="#000"/>
  <line x1="3" y1="95" x2="3" y2="97" class="crop-outer" stroke="#000"/>
  <line x1="59" y1="94" x2="61" y2="94" class="crop-outer" stroke="#000"/>
  <line x1="58" y1="95" x2="58" y2="97" class="crop-outer" stroke="#000"/>

  <!-- 上部ライン装飾 -->
  <line x1="3" y1="21" x2="58" y2="21" stroke="rgba(255,255,255,0.25)" stroke-width="0.3"/>

  <!-- 社名 -->
  <text x="30.5" y="13" class="company-en" text-anchor="middle" font-size="3.5px">Shiraimatsu Kikai Co., Ltd.</text>
  <text x="30.5" y="18" class="company-en" text-anchor="middle" font-size="2.6px" fill="#aaaaaa">Tokyo Branch</text>

  <!-- 役職 -->
  <text x="30.5" y="31" class="title-en" text-anchor="middle">General Manager, Manufacturer Business Division</text>
  <text x="30.5" y="35.5" class="title-en" text-anchor="middle">Executive Officer / Tokyo Branch Manager</text>

  <!-- 罫線 -->
  <line x1="12" y1="38.5" x2="49" y2="38.5" class="rule"/>

  <!-- 氏名 英語 -->
  <text x="30.5" y="50" class="name-en" text-anchor="middle">Tadashi Taga</text>

  <!-- 罫線 -->
  <line x1="12" y1="53" x2="49" y2="53" class="rule"/>

  <!-- 住所・連絡先 -->
  <text x="30.5" y="60" class="info-en" text-anchor="middle">2-14-32 Ogi, Adachi-ku, Tokyo 123-0873</text>
  <text x="30.5" y="65" class="info-en" text-anchor="middle">TEL 03-5647-1570　FAX 03-5647-1572</text>
  <text x="30.5" y="70" class="info-en" text-anchor="middle">Mobile 080-4062-2931</text>
  <text x="30.5" y="75" class="info-en" text-anchor="middle" font-size="2.1px">tadashi_taga@shiraimatsu.co.jp</text>

  <!-- 罫線 -->
  <line x1="12" y1="78" x2="49" y2="78" class="rule"/>

  <!-- 拠点 -->
  <text x="30.5" y="83.5" class="info-en" text-anchor="middle" font-size="2px" fill="#aaaaaa">[Osaka Head Office]　[Kyushu Sales Office]</text>
</svg>
