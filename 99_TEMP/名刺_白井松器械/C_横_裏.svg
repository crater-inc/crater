<?xml version="1.0" encoding="UTF-8"?>
<!-- 名刺 C案 横 裏面（英語・黒ベタ・白抜き） -->
<svg xmlns="http://www.w3.org/2000/svg" width="97mm" height="61mm" viewBox="0 0 97 61">
  <defs>
    <style>
      .crop-outer { stroke: #000; stroke-width: 0.25; fill: none; }
      .company-en { font-family: 'Georgia', serif; font-size: 3.5px; fill: #ffffff; letter-spacing: 0.4px; }
      .name-en { font-family: 'Georgia', serif; font-size: 8px; fill: #ffffff; letter-spacing: 0.5px; }
      .title-en { font-family: 'Arial', 'Helvetica', sans-serif; font-size: 2.4px; fill: #bbbbbb; }
      .info-en { font-family: 'Arial', 'Helvetica', sans-serif; font-size: 2.3px; fill: #cccccc; }
      .rule { stroke: rgba(255,255,255,0.2); stroke-width: 0.3; }
    </style>
  </defs>

  <!-- 黒ベタ面 -->
  <rect x="0" y="0" width="97" height="61" fill="#222222"/>

  <!-- トンボ -->
  <line x1="0" y1="3" x2="2" y2="3" class="crop-outer"/>
  <line x1="3" y1="0" x2="3" y2="2" class="crop-outer"/>
  <line x1="95" y1="3" x2="97" y2="3" class="crop-outer"/>
  <line x1="94" y1="0" x2="94" y2="2" class="crop-outer"/>
  <line x1="0" y1="58" x2="2" y2="58" class="crop-outer"/>
  <line x1="3" y1="59" x2="3" y2="61" class="crop-outer"/>
  <line x1="95" y1="58" x2="97" y2="58" class="crop-outer"/>
  <line x1="94" y1="59" x2="94" y2="61" class="crop-outer"/>

  <!-- 縦分割ライン -->
  <line x1="52" y1="7" x2="52" y2="54" class="rule"/>

  <!-- 左ブロック：名前・役職 -->
  <text x="8" y="15" class="title-en">General Manager, Manufacturer Business Division</text>
  <text x="8" y="20.5" class="title-en">Executive Officer / Tokyo Branch Manager</text>

  <text x="8" y="36" class="name-en">Tadashi Taga</text>

  <text x="8" y="45.5" class="company-en" font-size="2.8px">Shiraimatsu Kikai Co., Ltd.</text>
  <text x="8" y="50.5" class="company-en" font-size="2.3px" fill="#888888">Tokyo Branch</text>

  <!-- 右ブロック：連絡先 -->
  <text x="57" y="15" class="info-en" font-size="2px">2-14-32 Ogi, Adachi-ku</text>
  <text x="57" y="20" class="info-en" font-size="2px">Tokyo 123-0873, Japan</text>

  <line x1="57" y1="23" x2="91" y2="23" class="rule"/>

  <text x="57" y="28.5" class="info-en">TEL 03-5647-1570</text>
  <text x="57" y="33.5" class="info-en">FAX 03-5647-1572</text>
  <text x="57" y="38.5" class="info-en">Mobile 080-4062-2931</text>

  <line x1="57" y1="41" x2="91" y2="41" class="rule"/>

  <text x="57" y="46" class="info-en" font-size="2.1px">tadashi_taga@shiraimatsu.co.jp</text>

  <!-- 拠点 -->
  <text x="48.5" y="57" class="info-en" text-anchor="middle" font-size="2px" fill="#888">[Osaka Head Office]　[Kyushu Sales Office]</text>
</svg>
