<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KV 対角フェード サンプル</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }

  .kv {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    isolation: isolate;
  }

  @property --wipe {
    syntax: '<percentage>';
    initial-value: -90%;
    inherits: true;
  }

  .kv-slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    z-index: 0;
  }

  .kv-slide.active {
    opacity: 1;
    z-index: 1;
  }

  .kv-slide {
    /* クラス切り替え時のカクつきをopacityでなだらかに */
    transition: opacity 0.4s ease;
  }

  .kv-slide.leaving {
    z-index: 1;
    opacity: 1;
    /* 幅250%の超ソフトグラデーションで線を消す */
    mask-image: linear-gradient(
      -45deg,
      transparent calc(var(--wipe) - 250%),
      black var(--wipe)
    );
    -webkit-mask-image: linear-gradient(
      -45deg,
      transparent calc(var(--wipe) - 250%),
      black var(--wipe)
    );
  }

  .kv-slide.entering {
    opacity: 1;
    z-index: 2;
    mask-image: linear-gradient(
      -45deg,
      black calc(var(--wipe) - 250%),
      transparent var(--wipe)
    );
    -webkit-mask-image: linear-gradient(
      -45deg,
      black calc(var(--wipe) - 250%),
      transparent var(--wipe)
    );
  }

  /* ドットナビ */
  .kv-nav {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
  }

  .kv-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    border: none;
    cursor: pointer;
    transition: background 0.3s;
  }

  .kv-dot.active { background: #fff; }

  /* blend mode 切り替えUI */
  .blend-switcher {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 100;
    background: rgba(0,0,0,0.5);
    padding: 8px 12px;
    border-radius: 999px;
    backdrop-filter: blur(8px);
  }

  .blend-btn {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .blend-btn.active {
    background: #fff;
    color: #000;
  }
</style>
</head>
<body>

<div class="kv" id="kv">
  <div class="kv-slide active" style="background-image: url('https://picsum.photos/seed/shrine1/1600/900')"></div>
  <div class="kv-slide" style="background-image: url('https://picsum.photos/seed/forest2/1600/900')"></div>
  <div class="kv-slide" style="background-image: url('https://picsum.photos/seed/japan3/1600/900')"></div>
</div>

<div class="kv-nav" id="kvNav"></div>

<div class="blend-switcher" id="blendSwitcher"></div>

<script>
  const kv = document.getElementById('kv');
  const slides = document.querySelectorAll('.kv-slide');
  const nav = document.getElementById('kvNav');
  const blendSwitcher = document.getElementById('blendSwitcher');
  let current = 0;
  let isAnimating = false;
  let currentBlend = 'lighten';

  // 比較できるブレンドモード
  const blendModes = ['screen', 'soft-light', 'overlay', 'multiply', 'lighten', 'color-dodge'];

  blendModes.forEach(mode => {
    const btn = document.createElement('button');
    btn.className = 'blend-btn' + (mode === 'lighten' ? ' active' : '');
    btn.textContent = mode;
    btn.addEventListener('click', () => {
      currentBlend = mode;
      blendSwitcher.querySelectorAll('.blend-btn').forEach(b => b.classList.toggle('active', b.textContent === mode));
    });
    blendSwitcher.appendChild(btn);
  });

  const DURATION = 2200;
  const INTERVAL = 10000;
  const EASING = 'cubic-bezier(0.05, 0, 0.15, 1)';

  // ランダムに選ぶ方向パターン（角度 + 対応する逆方向）
  const directions = [
    { angle: '-45deg',  rev: '135deg'  }, // 右上→左下
    { angle: '45deg',   rev: '-135deg' }, // 左上→右下
    { angle: '0deg',    rev: '180deg'  }, // 上→下
    { angle: '90deg',   rev: '-90deg'  }, // 左→右
    { angle: '-30deg',  rev: '150deg'  }, // やや右上
    { angle: '30deg',   rev: '-150deg' }, // やや左上
  ];

  let lastDirIndex = -1;

  function randomDirection() {
    let i;
    do { i = Math.floor(Math.random() * directions.length); } while (i === lastDirIndex);
    lastDirIndex = i;
    return directions[i];
  }

  function applyMask(el, angle, isEntering) {
    const g = isEntering
      ? `linear-gradient(${angle}, black calc(var(--wipe) - 250%), transparent var(--wipe))`
      : `linear-gradient(${angle}, transparent calc(var(--wipe) - 250%), black var(--wipe))`;
    el.style.maskImage = g;
    el.style.webkitMaskImage = g;
  }

  slides.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'kv-dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goTo(i));
    nav.appendChild(dot);
  });

  function goTo(next) {
    if (isAnimating || next === current) return;
    isAnimating = true;

    const prev = current;
    current = next;

    nav.querySelectorAll('.kv-dot').forEach((d, i) => {
      d.classList.toggle('active', i === current);
    });

    // ランダム方向を決定してインラインマスクを適用
    const dir = randomDirection();
    slides[prev].classList.add('leaving');
    slides[next].classList.add('entering');
    applyMask(slides[prev], dir.angle, false);
    applyMask(slides[next], dir.angle, true);

    slides[prev].style.mixBlendMode = currentBlend;
    slides[next].style.mixBlendMode = currentBlend;

    // Web Animations API で --wipe を親要素に直接アニメーション
    // → クラス削除時のリセット問題がなくなる
    const anim = kv.animate(
      [{ '--wipe': '-90%' }, { '--wipe': '200%' }],
      { duration: DURATION, easing: EASING, fill: 'forwards' }
    );

    anim.onfinish = () => {
      slides[prev].classList.remove('leaving');
      slides[next].classList.remove('entering');
      slides[prev].classList.remove('active');
      slides[next].classList.add('active');
      slides[prev].style.mixBlendMode = '';
      slides[next].style.mixBlendMode = '';
      slides[prev].style.maskImage = '';
      slides[prev].style.webkitMaskImage = '';
      slides[next].style.maskImage = '';
      slides[next].style.webkitMaskImage = '';
      anim.cancel();
      isAnimating = false;
    };
  }

  setInterval(() => {
    goTo((current + 1) % slides.length);
  }, INTERVAL);
</script>

</body>
</html>
